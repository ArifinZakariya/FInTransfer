<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestureShare Global - Antar Jaringan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body { font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }
        
        .portal-gradient {
            background: radial-gradient(circle, rgba(59,130,246,0.3) 0%, rgba(30,41,59,0) 70%);
        }
        
        .launch-animation {
            animation: hyperLaunch 0.6s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }
        
        @keyframes hyperLaunch {
            0% { transform: translate(-50%, 0) scale(1); opacity: 1; filter: blur(0px); }
            100% { transform: translate(-50%, -500px) scale(0.1); opacity: 0; filter: blur(10px); }
        }

        #cam-container {
            transition: opacity 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 flex flex-col items-center">

    <!-- Dekorasi Latar Belakang -->
    <div class="fixed inset-0 pointer-events-none opacity-20">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600 rounded-full blur-[120px]"></div>
    </div>

    <!-- Bagian Header -->
    <header class="w-full max-w-md z-10 py-6 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold tracking-tighter bg-gradient-to-r from-white to-blue-400 bg-clip-text text-transparent">HYPERBEAM</h1>
            <p class="text-[10px] tracking-[0.4em] uppercase text-blue-500 font-bold">Global P2P Transfer</p>
        </div>
        <div class="flex flex-col items-end gap-2">
            <div id="connection-indicator" class="flex items-center gap-2 px-3 py-1 bg-slate-900 border border-slate-800 rounded-full">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_5px_#ef4444]"></div>
                <span id="status-text" class="text-[10px] font-bold">OFFLINE</span>
            </div>
        </div>
    </header>

    <!-- Pusat Koneksi -->
    <div class="w-full max-w-md z-10 space-y-4 mb-6">
        <div class="bg-slate-900/80 border border-slate-800 rounded-[2rem] p-6 backdrop-blur-xl shadow-2xl relative overflow-hidden group">
            <div class="relative z-10 flex justify-between items-center">
                <div>
                    <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">ID Perangkat Anda</h2>
                    <div class="flex items-center gap-3">
                        <span id="my-id-display" class="text-3xl font-mono font-black tracking-widest">-----</span>
                        <button id="copy-btn" class="p-2 hover:text-blue-400 transition-colors">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                <button id="share-btn" class="bg-blue-600 hover:bg-blue-500 p-4 rounded-2xl shadow-lg shadow-blue-600/30 transition-all active:scale-95 group">
                    <i data-lucide="send" class="w-6 h-6 group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i>
                </button>
            </div>
            <div class="mt-4 pt-4 border-t border-slate-800/50 flex gap-2" id="connect-input-container">
                <input type="text" id="target-id-input" placeholder="Masukkan ID teman..." 
                       class="flex-1 bg-black/40 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition-all uppercase font-mono tracking-widest">
                <button id="connect-btn" class="px-6 bg-white text-black rounded-xl font-bold text-sm hover:bg-blue-50 transition-all">Hubungkan</button>
            </div>

            <div id="connected-badge" class="hidden mt-4 pt-4 border-t border-slate-800/50 flex items-center justify-between">
                <div class="flex items-center gap-3 text-blue-400">
                    <i data-lucide="link" class="w-4 h-4"></i>
                    <span class="text-sm font-bold tracking-widest" id="peer-id-label">TERHUBUNG: ---</span>
                </div>
                <button id="disconnect-btn" class="text-red-400 text-xs font-bold hover:underline">PUTUSKAN</button>
            </div>
        </div>
    </div>

    <!-- Area Gestur -->
    <main class="w-full max-w-md z-10 flex flex-col gap-4">
        <div class="relative aspect-square rounded-[2.5rem] overflow-hidden bg-slate-900 border border-slate-800 group shadow-2xl">
            <!-- Tombol Toggle Kamera -->
            <button id="toggle-camera-btn" class="absolute top-4 right-4 z-50 p-3 bg-black/50 hover:bg-black/80 rounded-2xl backdrop-blur-md border border-white/10 transition-all">
                <i data-lucide="camera" id="cam-icon" class="w-5 h-5 text-white"></i>
            </button>

            <div id="cam-container" class="w-full h-full opacity-0">
                <video id="webcam" class="hidden" playsinline></video>
                <canvas id="output-canvas" class="w-full h-full object-cover scale-x-[-1]"></canvas>
            </div>
            
            <div id="cam-placeholder" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900">
                <div class="w-20 h-20 rounded-3xl bg-slate-800 flex items-center justify-center mb-4">
                    <i data-lucide="camera-off" class="w-10 h-10 text-slate-600"></i>
                </div>
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">Kamera Dinonaktifkan</p>
                <button id="enable-cam-hint" class="mt-4 text-blue-500 text-[10px] font-bold hover:underline uppercase">Aktifkan Kamera</button>
            </div>
            
            <!-- Overlay Gestur HUD -->
            <div id="gesture-hud" class="absolute inset-0 pointer-events-none flex flex-col items-center justify-center hidden">
                <div id="portal-ui" class="w-40 h-40 rounded-full flex items-center justify-center transition-all duration-300 portal-gradient border border-white/5">
                    <div id="gesture-icon-box" class="w-16 h-16 rounded-full bg-slate-800/60 border border-white/10 flex items-center justify-center backdrop-blur-md">
                        <i data-lucide="hand" id="hand-icon" class="w-8 h-8 text-white/40"></i>
                    </div>
                </div>
                <div class="mt-4 text-center">
                    <p id="gesture-state-text" class="text-[9px] font-black tracking-[0.4em] uppercase text-white/30">Mendeteksi Tangan</p>
                </div>
            </div>

            <!-- Payload Meluncur (Visual File) -->
            <div id="payload" class="absolute left-1/2 bottom-20 -translate-x-1/2 pointer-events-none hidden z-50">
                <div class="w-16 h-16 bg-blue-500 rounded-2xl flex items-center justify-center shadow-[0_0_30px_#3b82f6]">
                    <i data-lucide="package" class="w-8 h-8 text-white"></i>
                </div>
            </div>
        </div>

        <!-- Kontrol File -->
        <div class="bg-slate-900/50 border border-slate-800 rounded-3xl p-4 backdrop-blur-md">
            <input type="file" id="file-selector" class="hidden">
            <div class="flex flex-col gap-3">
                <button id="pick-file-btn" class="w-full py-4 border-2 border-dashed border-slate-700 rounded-2xl flex items-center justify-center gap-3 hover:border-blue-500 hover:bg-blue-500/5 transition-all group">
                    <i data-lucide="file-plus" class="w-5 h-5 text-slate-500 group-hover:text-blue-500"></i>
                    <span id="selected-file-name" class="text-sm font-medium text-slate-400 group-hover:text-slate-100">Pilih File</span>
                </button>
                
                <!-- Tombol Kirim Manual (Jika kamera mati) -->
                <button id="manual-send-btn" class="hidden w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold text-sm shadow-lg shadow-blue-600/20 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="rocket" class="w-4 h-4"></i> KIRIM FILE SEKARANG
                </button>
            </div>
            <p id="instruction-text" class="text-[10px] text-center text-slate-600 mt-3 italic uppercase tracking-wider">Berikan izin kamera untuk menggunakan gestur</p>
        </div>

        <!-- Riwayat Transfer -->
        <div id="history-box" class="hidden">
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 ml-2 text-center">Sinkronisasi File</h3>
            <div id="transfer-logs" class="space-y-2"></div>
        </div>
    </main>

    <!-- Notifikasi Toast -->
    <div id="notif" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-600 px-8 py-3 rounded-2xl shadow-2xl text-xs font-bold opacity-0 transition-all duration-500 translate-y-20 z-[100]">
        NOTIFIKASI
    </div>

    <script>
        const peerConfig = {
            config: {
                'iceServers': [
                    { url: 'stun:stun.l.google.com:19302' },
                    { url: 'stun:stun1.l.google.com:19302' },
                    { url: 'stun:stun2.l.google.com:19302' },
                    { url: 'stun:stun.services.mozilla.com' },
                    { url: 'stun:global.stun.twilio.com:3478' }
                ]
            },
            debug: 1
        };

        let peer, conn, selectedFile, isSending = false, lastY = 0, isCameraActive = false;
        let cameraInstance = null;

        const ui = {
            myIdDisplay: document.getElementById('my-id-display'),
            targetIdInput: document.getElementById('target-id-input'),
            statusText: document.getElementById('status-text'),
            statusDot: document.getElementById('status-dot'),
            connectBtn: document.getElementById('connect-btn'),
            disconnectBtn: document.getElementById('disconnect-btn'),
            inputContainer: document.getElementById('connect-input-container'),
            connectedBadge: document.getElementById('connected-badge'),
            peerLabel: document.getElementById('peer-id-label'),
            fileSelector: document.getElementById('file-selector'),
            pickFileBtn: document.getElementById('pick-file-btn'),
            fileName: document.getElementById('selected-file-name'),
            gestureText: document.getElementById('gesture-state-text'),
            handIcon: document.getElementById('hand-icon'),
            portal: document.getElementById('portal-ui'),
            payload: document.getElementById('payload'),
            notif: document.getElementById('notif'),
            transferLogs: document.getElementById('transfer-logs'),
            historyBox: document.getElementById('history-box'),
            camContainer: document.getElementById('cam-container'),
            camPlaceholder: document.getElementById('cam-placeholder'),
            toggleCamBtn: document.getElementById('toggle-camera-btn'),
            camIcon: document.getElementById('cam-icon'),
            gestureHud: document.getElementById('gesture-hud'),
            manualSendBtn: document.getElementById('manual-send-btn'),
            instruction: document.getElementById('instruction-text')
        };

        lucide.createIcons();

        function showNotif(msg) {
            ui.notif.innerText = msg;
            ui.notif.classList.remove('opacity-0', 'translate-y-20');
            setTimeout(() => ui.notif.classList.add('opacity-0', 'translate-y-20'), 3000);
        }

        // --- Logika PeerJS ---
        function initializePeer() {
            const uniqueId = Math.random().toString(36).substring(2, 7).toUpperCase();
            peer = new Peer(uniqueId, peerConfig);

            peer.on('open', (id) => {
                ui.myIdDisplay.innerText = id;
                ui.statusText.innerText = "ONLINE";
                ui.statusDot.className = "w-2 h-2 rounded-full bg-blue-500 shadow-[0_0_10px_#3b82f6]";
                
                const hashId = window.location.hash.replace('#', '');
                if (hashId && hashId.length === 5) {
                    ui.targetIdInput.value = hashId;
                    setTimeout(connectToPeer, 1000);
                }
            });

            peer.on('connection', setupConnection);
            peer.on('error', (err) => {
                console.error("Peer Error:", err);
                resetUI();
            });
        }

        function setupConnection(c) {
            if (conn) conn.close();
            conn = c;
            conn.on('open', () => {
                showNotif("Sinkronisasi Berhasil!");
                ui.peerLabel.innerText = "TERHUBUNG: " + conn.peer;
                ui.inputContainer.classList.add('hidden');
                ui.connectedBadge.classList.remove('hidden');
                ui.historyBox.classList.remove('hidden');
                ui.statusText.innerText = "LINKED";
                ui.statusDot.className = "w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]";
                updateManualSendVisibility();
            });

            conn.on('data', (data) => {
                if (data.type === 'file-transfer') {
                    handleIncomingFile(data);
                }
            });

            conn.on('close', resetUI);
        }

        function connectToPeer() {
            const target = ui.targetIdInput.value.trim().toUpperCase();
            if (!target || target === peer.id) return;
            ui.statusText.innerText = "CONNECTING...";
            const connection = peer.connect(target, { reliable: true });
            setupConnection(connection);
        }

        function resetUI() {
            conn = null;
            ui.inputContainer.classList.remove('hidden');
            ui.connectedBadge.classList.add('hidden');
            ui.statusText.innerText = "ONLINE";
            ui.statusDot.className = "w-2 h-2 rounded-full bg-blue-500";
            updateManualSendVisibility();
        }

        // --- Kamera & Gestur ---
        async function startCamera() {
            try {
                if (!cameraInstance) {
                    cameraInstance = new Camera(document.getElementById('webcam'), {
                        onFrame: async () => { 
                            if (isCameraActive) await hands.send({image: document.getElementById('webcam')}); 
                        },
                        width: 640, height: 640
                    });
                }
                await cameraInstance.start();
                isCameraActive = true;
                ui.camContainer.classList.replace('opacity-0', 'opacity-100');
                ui.camPlaceholder.classList.add('hidden');
                ui.gestureHud.classList.remove('hidden');
                ui.camIcon.setAttribute('data-lucide', 'camera-off');
                ui.instruction.innerText = "Kepal untuk kunci, lempar untuk kirim";
                updateManualSendVisibility();
            } catch (err) {
                console.error("Camera error:", err);
                showNotif("Gagal akses kamera.");
                stopCamera();
            }
            lucide.createIcons();
        }

        function stopCamera() {
            isCameraActive = false;
            if (cameraInstance) {
                const video = document.getElementById('webcam');
                const stream = video.srcObject;
                if (stream) stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
            ui.camContainer.classList.replace('opacity-100', 'opacity-0');
            ui.camPlaceholder.classList.remove('hidden');
            ui.gestureHud.classList.add('hidden');
            ui.camIcon.setAttribute('data-lucide', 'camera');
            ui.instruction.innerText = "Mode Manual Aktif";
            updateManualSendVisibility();
            lucide.createIcons();
        }

        function updateManualSendVisibility() {
            if (!isCameraActive && selectedFile && conn && conn.open) {
                ui.manualSendBtn.classList.remove('hidden');
            } else {
                ui.manualSendBtn.classList.add('hidden');
            }
        }

        // --- Interaksi ---
        ui.toggleCamBtn.onclick = () => isCameraActive ? stopCamera() : startCamera();
        ui.connectBtn.onclick = connectToPeer;
        ui.disconnectBtn.onclick = () => conn && conn.close();
        ui.pickFileBtn.onclick = () => ui.fileSelector.click();
        ui.manualSendBtn.onclick = launchFile;
        document.getElementById('enable-cam-hint').onclick = startCamera;
        
        ui.fileSelector.onchange = (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                ui.fileName.innerText = selectedFile.name;
                ui.fileName.classList.replace('text-slate-400', 'text-blue-400');
                showNotif("File Siap.");
                updateManualSendVisibility();
            }
        };

        document.getElementById('share-btn').onclick = () => {
            const url = `${window.location.origin}${window.location.pathname}#${peer.id}`;
            const el = document.createElement('textarea');
            el.value = url;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showNotif("Link disalin!");
        };

        document.getElementById('copy-btn').onclick = () => {
            const el = document.createElement('textarea');
            el.value = peer.id;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showNotif("ID Disalin!");
        };

        async function launchFile() {
            if (!conn || !conn.open) return showNotif("Belum terhubung!");
            if (!selectedFile || isSending) return;

            isSending = true;
            ui.payload.classList.remove('hidden');
            ui.payload.classList.add('launch-animation');

            const reader = new FileReader();
            reader.onload = () => {
                conn.send({
                    type: 'file-transfer',
                    name: selectedFile.name,
                    mime: selectedFile.type,
                    data: reader.result
                });

                setTimeout(() => {
                    ui.payload.classList.add('hidden');
                    ui.payload.classList.remove('launch-animation');
                    addLog(selectedFile.name, 'sent');
                    isSending = false;
                    showNotif("Berhasil Terkirim!");
                }, 700);
            };
            reader.readAsArrayBuffer(selectedFile);
        }

        function handleIncomingFile(data) {
            const blob = new Blob([data.data], { type: data.mime });
            const url = URL.createObjectURL(blob);
            addLog(data.name, 'received', url);
            showNotif("File masuk!");
        }

        function addLog(name, type, url = null) {
            const div = document.createElement('div');
            div.className = "bg-slate-900 border border-slate-800 p-4 rounded-2xl flex items-center justify-between";
            const isSent = type === 'sent';
            
            div.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center">
                        <i data-lucide="${isSent ? 'arrow-up-right' : 'arrow-down-left'}" class="w-4 h-4 ${isSent ? 'text-blue-500' : 'text-green-500'}"></i>
                    </div>
                    <div class="overflow-hidden max-w-[140px]">
                        <p class="text-xs font-bold truncate">${name}</p>
                        <p class="text-[8px] uppercase tracking-tighter text-slate-500 font-black">${type}</p>
                    </div>
                </div>
                ${url ? `<a href="${url}" download="${name}" class="bg-white text-black text-[9px] font-black px-4 py-2 rounded-lg hover:bg-blue-400 transition-colors">UNDUH</a>` : `<span class="text-[8px] font-black text-blue-500">BERHASIL</span>`}
            `;
            ui.transferLogs.prepend(div);
            lucide.createIcons();
        }

        // --- MediaPipe Results ---
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d');

        function onResults(results) {
            if (!isCameraActive) return;
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                drawConnectors(ctx, hand, HAND_CONNECTIONS, {color: '#3b82f6', lineWidth: 3});
                drawLandmarks(ctx, hand, {color: '#ffffff', lineWidth: 1, radius: 2});

                const wrist = hand[0];
                const fingers = [8, 12, 16, 20];
                let closeCount = 0;
                fingers.forEach(i => {
                    const tip = hand[i];
                    const dist = Math.sqrt(Math.pow(tip.x - wrist.x, 2) + Math.pow(tip.y - wrist.y, 2));
                    if (dist < 0.28) closeCount++;
                });

                const isClosed = closeCount >= 3;

                if (isClosed) {
                    ui.gestureText.innerText = "SIAP LEMPAR";
                    ui.gestureText.classList.add('text-blue-400');
                    ui.portal.classList.replace('portal-gradient', 'bg-blue-500/20');
                    ui.handIcon.innerHTML = `<i data-lucide="package" class="w-8 h-8 text-white animate-bounce"></i>`;
                    
                    const deltaY = lastY - wrist.y;
                    if (deltaY > 0.18 && !isSending && selectedFile) launchFile();
                    lastY = wrist.y;
                } else {
                    ui.gestureText.innerText = "MENDETEKSI TANGAN";
                    ui.gestureText.classList.remove('text-blue-400');
                    ui.portal.classList.replace('bg-blue-500/20', 'portal-gradient');
                    ui.handIcon.innerHTML = `<i data-lucide="hand" class="w-8 h-8 text-white/30"></i>`;
                    lastY = wrist.y;
                }
                lucide.createIcons();
            } else {
                ui.gestureText.innerText = "POSISIKAN TANGAN";
            }
            ctx.restore();
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
        hands.onResults(onResults);

        window.onload = () => {
            initializePeer();
            canvas.width = 640;
            canvas.height = 640;
        };
    </script>
</body>
</html>
